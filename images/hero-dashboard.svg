<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 420" width="100%" height="100%" fill="none">
  <!-- Subtle card drop shadow filter -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="112%" height="112%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.04" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.02" />
    </filter>
    <linearGradient id="blue-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="emerald-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Decorative dot grid background -->
  <g fill="#e4e4e7" opacity="0.4">
    <circle cx="20" cy="20" r="1.5" />
    <circle cx="60" cy="20" r="1.5" />
    <circle cx="100" cy="20" r="1.5" />
    <circle cx="140" cy="20" r="1.5" />
    <circle cx="180" cy="20" r="1.5" />
    <circle cx="220" cy="20" r="1.5" />
    <circle cx="260" cy="20" r="1.5" />
    <circle cx="300" cy="20" r="1.5" />
    <circle cx="340" cy="20" r="1.5" />
    <circle cx="380" cy="20" r="1.5" />
    <circle cx="420" cy="20" r="1.5" />
    <circle cx="460" cy="20" r="1.5" />
    <circle cx="500" cy="20" r="1.5" />
    <circle cx="540" cy="20" r="1.5" />

    <circle cx="20" cy="60" r="1.5" />
    <circle cx="540" cy="60" r="1.5" />
    <circle cx="20" cy="100" r="1.5" />
    <circle cx="540" cy="100" r="1.5" />
    <circle cx="20" cy="140" r="1.5" />
    <circle cx="540" cy="140" r="1.5" />
    <circle cx="20" cy="180" r="1.5" />
    <circle cx="540" cy="180" r="1.5" />
    <circle cx="20" cy="220" r="1.5" />
    <circle cx="540" cy="220" r="1.5" />
    <circle cx="20" cy="260" r="1.5" />
    <circle cx="540" cy="260" r="1.5" />
    <circle cx="20" cy="300" r="1.5" />
    <circle cx="540" cy="300" r="1.5" />
    <circle cx="20" cy="340" r="1.5" />
    <circle cx="540" cy="340" r="1.5" />
    <circle cx="20" cy="380" r="1.5" />
    <circle cx="540" cy="380" r="1.5" />
  </g>

  <!-- Ambient light graphic accents -->
  <circle cx="400" cy="150" r="80" fill="#eff6ff" opacity="0.6" />
  <circle cx="150" cy="300" r="90" fill="#ecfdf5" opacity="0.6" />

  <!-- MAIN DASHBOARD WINDOW CARD -->
  <g filter="url(#shadow)">
    <rect x="50" y="40" width="450" height="320" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
  </g>

  <!-- Browser window header dot bar -->
  <circle cx="70" cy="58" r="5" fill="#f87171" />
  <circle cx="86" cy="58" r="5" fill="#fbbf24" />
  <circle cx="102" cy="58" r="5" fill="#34d399" />
  <rect x="130" y="52" width="120" height="12" rx="4" fill="#f4f4f5" />
  <line x1="50" y1="74" x2="500" y2="74" stroke="#e4e4e7" stroke-width="1" />

  <!-- Sidebar layout -->
  <rect x="51" y="75" width="110" height="284" fill="#fafafa" rx="0" />
  <line x1="161" y1="74" x2="161" y2="359" stroke="#e4e4e7" stroke-width="1" />

  <!-- Sidebar Nav items -->
  <rect x="65" y="95" width="80" height="14" rx="4" fill="#e4e4e7" opacity="0.5" />
  <rect x="65" y="125" width="80" height="14" rx="4" fill="#eff6ff" />
  <rect x="65" y="129" width="30" height="6" rx="2" fill="#3b82f6" />
  <rect x="65" y="155" width="80" height="14" rx="4" fill="#e4e4e7" opacity="0.5" />
  <rect x="65" y="185" width="80" height="14" rx="4" fill="#e4e4e7" opacity="0.5" />
  <rect x="65" y="215" width="80" height="14" rx="4" fill="#e4e4e7" opacity="0.5" />

  <!-- Main Area Elements -->
  <!-- Stats row -->
  <g>
    <!-- Card 1 -->
    <rect x="180" y="95" width="95" height="50" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <rect x="192" y="107" width="40" height="6" rx="2" fill="#a1a1aa" />
    <rect x="192" y="122" width="60" height="12" rx="3" fill="#18181b" />
    <!-- Card 2 -->
    <rect x="290" y="95" width="95" height="50" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <rect x="302" y="107" width="40" height="6" rx="2" fill="#a1a1aa" />
    <rect x="302" y="122" width="50" height="12" rx="3" fill="#2563eb" />
    <!-- Card 3 -->
    <rect x="400" y="95" width="85" height="50" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <rect x="412" y="107" width="35" height="6" rx="2" fill="#a1a1aa" />
    <rect x="412" y="122" width="45" height="12" rx="3" fill="#10b981" />
  </g>

  <!-- Large Graph Card -->
  <g>
    <rect x="180" y="165" width="305" height="110" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <rect x="195" y="177" width="70" height="8" rx="3" fill="#e4e4e7" />
    
    <!-- Graph path -->
    <path d="M 195 255 L 230 230 L 265 240 L 300 200 L 335 220 L 370 190 L 405 210 L 440 185 L 475 200" fill="none" stroke="url(#blue-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Graph grid lines -->
    <line x1="195" y1="210" x2="475" y2="210" stroke="#f4f4f5" stroke-dasharray="2 2" stroke-width="1" />
    <line x1="195" y1="235" x2="475" y2="235" stroke="#f4f4f5" stroke-dasharray="2 2" stroke-width="1" />

    <!-- Graph fill accent -->
    <path d="M 195 255 L 230 230 L 265 240 L 300 200 L 335 220 L 370 190 L 405 210 L 440 185 L 475 200 L 475 260 L 195 260 Z" fill="url(#blue-gradient)" opacity="0.05" />
    
    <!-- Dots on key vertices -->
    <circle cx="370" cy="190" r="4.5" fill="#ffffff" stroke="#2563eb" stroke-width="2" />
    <circle cx="440" cy="185" r="4.5" fill="#ffffff" stroke="#2563eb" stroke-width="2" />
  </g>

  <!-- Grid list underneath -->
  <g>
    <!-- Progress item 1 -->
    <rect x="180" y="290" width="145" height="50" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <circle cx="205" cy="315" r="12" fill="#eff6ff" />
    <circle cx="205" cy="315" r="4" fill="#3b82f6" />
    <rect x="228" y="306" width="50" height="6" rx="2" fill="#27272a" />
    <rect x="228" y="318" width="80" height="4" rx="2" fill="#a1a1aa" opacity="0.6" />

    <!-- Progress item 2 -->
    <rect x="340" y="290" width="145" height="50" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <circle cx="365" cy="315" r="12" fill="#ecfdf5" />
    <path d="M361 315 L364 318 L370 312" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="388" y="306" width="50" height="6" rx="2" fill="#27272a" />
    <rect x="388" y="318" width="80" height="4" rx="2" fill="#a1a1aa" opacity="0.6" />
  </g>

  <!-- FLOATING CARD OVERLAYS for "human-crafted feel" depth -->
  <!-- Card A: Top-Right (conversion rates) -->
  <g filter="url(#shadow)">
    <rect x="420" y="14" width="100" height="65" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <rect x="432" y="26" width="40" height="5" rx="2" fill="#71717a" />
    <text x="432" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="14" fill="#18181b">24.8%</text>
    <rect x="432" y="55" width="60" height="3" rx="1.5" fill="#10b981" />
  </g>

  <!-- Card B: Bottom-Left (active stats badge) -->
  <g filter="url(#shadow)">
    <rect x="15" y="260" width="125" height="75" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" />
    <circle cx="35" cy="285" r="10" fill="#fef3c7" />
    <!-- Yellow warning star badge -->
    <path d="M35 281 L35.8 283.5 L38.5 283.5 L36.3 285 L37.1 287.5 L35 286 L32.9 287.5 L33.7 285 L31.5 283.5 L34.2 283.5 Z" fill="#d97706" />
    <rect x="52" y="278" width="50" height="5" rx="2" fill="#71717a" />
    <rect x="52" y="288" width="30" height="4" rx="2" fill="#a1a1aa" />
    
    <rect x="25" y="306" width="105" height="15" rx="4" fill="#18181b" />
    <rect x="50" y="311" width="55" height="4" rx="2" fill="#ffffff" />
  </g>
</svg>
